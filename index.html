<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeSentinel - AI Security Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      :root {
        --cyber-black: #0a0a0a;
        --cyber-dark: #111111;
        --cyber-gray: #1f1f1f;
        --cyber-accent: #00f0ff;
        --cyber-danger: #ff2a6d;
        --cyber-success: #05d5fa;
        --cyber-text: #e0e0e0;
        --cyber-dim: #858585;
      }
      
      body {
        font-family: 'Inter', sans-serif;
        background-color: #050505;
        color: var(--cyber-text);
      }
      
      .font-mono { font-family: 'JetBrains Mono', monospace; }
      .font-sans { font-family: 'Inter', sans-serif; }
      
      .min-h-screen { min-height: 100vh; }
      .h-screen { height: 100vh; }
      .h-full { height: 100%; }
      .h-16 { height: 4rem; }
      .h-8 { height: 2rem; }
      .h-6 { height: 1.5rem; }
      .h-4 { height: 1rem; }
      .h-20 { height: 5rem; }
      .h-\[calc\(100vh-4rem\)\] { height: calc(100vh - 4rem); }
      
      .w-full { width: 100%; }
      .w-8 { width: 2rem; }
      .w-10 { width: 2.5rem; }
      .w-4 { width: 1rem; }
      .w-3 { width: 0.75rem; }
      .w-20 { width: 5rem; }
      .w-16 { width: 4rem; }
      
      .max-w-7xl { max-width: 80rem; }
      .max-w-xs { max-width: 20rem; }
      
      .flex { display: flex; }
      .grid { display: grid; }
      .hidden { display: none; }
      
      .flex-col { flex-direction: column; }
      .flex-1 { flex: 1 1 0%; }
      .items-center { align-items: center; }
      .items-start { align-items: flex-start; }
      .justify-center { justify-content: center; }
      .justify-between { justify-content: space-between; }
      .justify-end { justify-content: flex-end; }
      
      .gap-2 { gap: 0.5rem; }
      .gap-3 { gap: 0.75rem; }
      .gap-4 { gap: 1rem; }
      .gap-8 { gap: 2rem; }
      
      .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
      
      @media (min-width: 1024px) {
        .lg\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .lg\:flex-row { flex-direction: row; }
      }
      
      .p-4 { padding: 1rem; }
      .p-6 { padding: 1.5rem; }
      .p-8 { padding: 2rem; }
      .p-2 { padding: 0.5rem; }
      .p-1 { padding: 0.25rem; }
      .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
      .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
      .py-1\.5 { padding-top: 0.375rem; padding-bottom: 0.375rem; }
      .py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
      .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
      .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
      .px-4 { padding-left: 1rem; padding-right: 1rem; }
      
      .m-0 { margin: 0; }
      .mb-2 { margin-bottom: 0.5rem; }
      .mb-4 { margin-bottom: 1rem; }
      .mt-1 { margin-top: 0.25rem; }
      .mt-2 { margin-top: 0.5rem; }
      
      .rounded { border-radius: 0.25rem; }
      .rounded-lg { border-radius: 0.5rem; }
      .rounded-full { border-radius: 9999px; }
      
      .border { border-width: 1px; }
      .border-b { border-bottom-width: 1px; }
      .border-2 { border-width: 2px; }
      .border-4 { border-width: 4px; }
      .border-cyber-gray { border-color: var(--cyber-gray); }
      .border-cyber-danger { border-color: var(--cyber-danger); }
      .border-transparent { border-color: transparent; }
      .border-t-transparent { border-top-color: transparent; }
      
      .bg-cyber-black { background-color: var(--cyber-black); }
      .bg-cyber-dark { background-color: var(--cyber-dark); }
      .bg-cyber-gray { background-color: var(--cyber-gray); }
      .bg-cyber-accent { background-color: var(--cyber-accent); }
      .bg-cyber-danger { background-color: var(--cyber-danger); }
      .bg-cyber-success { background-color: var(--cyber-success); }
      .bg-white { background-color: white; }
      .bg-transparent { background-color: transparent; }
      .bg-rose-950\\/10 { background-color: rgba(80, 7, 30, 0.1); }
      .bg-emerald-950\\/10 { background-color: rgba(6, 78, 59, 0.1); }
      .bg-cyber-accent\\/5 { background-color: rgba(0, 240, 255, 0.05); }
      .bg-cyber-success\\/5 { background-color: rgba(5, 213, 250, 0.05); }
      .bg-blue-400\\/5 { background-color: rgba(96, 165, 250, 0.05); }
      .bg-cyber-danger\\/10 { background-color: rgba(255, 42, 109, 0.1); }
      .bg-cyber-success\\/10 { background-color: rgba(5, 213, 250, 0.1); }
      
      .bg-gradient-to-br { background-image: linear-gradient(to bottom right, var(--tw-gradient-stops)); }
      .from-cyber-accent { --tw-gradient-from: var(--cyber-accent); }
      .to-blue-600 { --tw-gradient-to: #2563eb; }
      
      .text-white { color: white; }
      .text-black { color: black; }
      .text-cyber-text { color: var(--cyber-text); }
      .text-cyber-accent { color: var(--cyber-accent); }
      .text-cyber-danger { color: var(--cyber-danger); }
      .text-cyber-success { color: var(--cyber-success); }
      .text-cyber-dim { color: var(--cyber-dim); }
      .text-gray-300 { color: #d1d5db; }
      .text-gray-400 { color: #9ca3af; }
      .text-gray-500 { color: #6b7280; }
      .text-gray-700 { color: #374151; }
      
      .text-xs { font-size: 0.75rem; line-height: 1rem; }
      .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
      .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
      .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
      .text-2xl { font-size: 1.5rem; line-height: 2rem; }
      
      .font-bold { font-weight: 700; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
      
      .uppercase { text-transform: uppercase; }
      .tracking-widest { letter-spacing: 0.1em; }
      .tracking-wider { letter-spacing: 0.05em; }
      .tracking-tight { letter-spacing: -0.025em; }
      
      .text-center { text-align: center; }
      .text-right { text-align: right; }
      
      .leading-relaxed { line-height: 1.625; }
      
      .resize-none { resize: none; }
      
      .overflow-hidden { overflow: hidden; }
      .overflow-y-auto { overflow-y: auto; }
      
      .relative { position: relative; }
      .absolute { position: absolute; }
      .sticky { position: sticky; }
      .top-0 { top: 0; }
      .top-1 { top: 0.25rem; }
      .top-full { top: 100%; }
      .left-0 { left: 0; }
      .left-1 { left: 0.25rem; }
      .right-0 { right: 0; }
      
      .z-50 { z-index: 50; }
      
      .shadow-xl { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
      
      .backdrop-blur-md { backdrop-filter: blur(12px); }
      .backdrop-blur-sm { backdrop-filter: blur(4px); }
      
      .group:hover .group-hover\:opacity-40 { opacity: 0.4; }
      
      .transition-colors { transition-property: color, background-color, border-color; transition-duration: 150ms; }
      .transition-transform { transition-property: transform; transition-duration: 150ms; }
      .transition-all { transition-property: all; transition-duration: 150ms; }
      .duration-500 { transition-duration: 500ms; }
      
      .translate-x-0 { transform: translateX(0); }
      .translate-x-4 { transform: translateX(1rem); }
      .rotate-180 { transform: rotate(180deg); }
      .rotate-90 { transform: rotate(90deg); }
      
      .scale-95 { transform: scale(0.95); }
      .active\:scale-95:active { transform: scale(0.95); }
      
      .cursor-pointer { cursor: pointer; }
      .cursor-not-allowed { cursor: not-allowed; }
      
      .select-none { user-select: none; }
      .selection\:bg-cyber-accent *::selection { background-color: var(--cyber-accent); }
      .selection\:text-black *::selection { color: black; }
      
      .opacity-50 { opacity: 0.5; }
      .opacity-40 { opacity: 0.4; }
      .opacity-80 { opacity: 0.8; }
      
      .pointer-events-none { pointer-events: none; }
      
      .group { display: contents; }
      .group:hover .group-hover\:opacity-40 { opacity: 0.4; }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #111; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #444; }
      
      /* Animation classes */
      .animate-spin { animation: spin 1s linear infinite; }
      .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      /* Opacity variants */
      .hover\:bg-gray-700:hover { background-color: #374151; }
      .hover\:bg-cyber-accent:hover { background-color: var(--cyber-accent); }
      .hover\:text-white:hover { color: white; }
      .hover\:shadow-\[0_0_20px_rgba\(0\,240\,255\,0\.5\)\]:hover { box-shadow: 0 0 20px rgba(0,240,255,0.5); }
      
      /* Focus states */
      .focus\:outline-none:focus { outline: none; }
      .focus\:border-cyber-accent:focus { border-color: var(--cyber-accent); }
      .focus\:ring-1:focus { box-shadow: 0 0 0 1px var(--cyber-accent); }
      
      /* Button styles */
      .btn {
        padding: 1rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 150ms;
        cursor: pointer;
        border: none;
      }
      
      .btn-primary {
        background-color: white;
        color: black;
      }
      
      .btn-primary:hover {
        background-color: var(--cyber-accent);
        box-shadow: 0 0 20px rgba(0,240,255,0.5);
      }
      
      .btn-primary:disabled {
        background-color: var(--cyber-gray);
        color: #9ca3af;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
